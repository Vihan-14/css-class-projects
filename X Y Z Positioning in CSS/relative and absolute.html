<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div.absolute{
            position:absolute ;
            background-color: thistle;
            border: 2px solid black;
        }
        div.relative{
            position: relative;
            background-color: aliceblue;
            border: 4px solid black;
        }
    </style>
</head>
<body>
    <div class="absolute">
        <p>this is absolute positioning</p>
        <div class="relative">
            <p>this relative positioning</p>

        </div>
        

    </div>
</body>
</html>
