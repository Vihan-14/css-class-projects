<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .p1{
            text-transform: capitalize;
        }
        .p2{
            text-transform: lowercase;
        }
        .p3{
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <h1 class="p1">word</h1>
    <h1 class="p2">WORD</h1>
    <h1 class="p3">word</h1>
    
</body>
</html>
